<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="100%" stop-color="#FF6035"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Base rounded square -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="100" height="100" rx="24" fill="url(#shine)"/>
  <!-- Fork icon (professional cutlery) -->
  <!-- Fork left tine -->
  <rect x="28" y="18" width="4" height="22" rx="2" fill="white"/>
  <!-- Fork middle tine -->
  <rect x="36" y="18" width="4" height="22" rx="2" fill="white"/>
  <!-- Fork right tine -->
  <rect x="44" y="18" width="4" height="22" rx="2" fill="white"/>
  <!-- Fork bridge -->
  <rect x="28" y="38" width="20" height="4" rx="2" fill="white"/>
  <!-- Fork handle -->
  <rect x="34" y="42" width="8" height="26" rx="4" fill="white"/>
  <!-- Knife blade -->
  <path d="M62 18 C62 18 68 24 68 36 L62 36 Z" fill="white"/>
  <!-- Knife handle guard -->
  <rect x="60" y="36" width="10" height="4" rx="2" fill="white"/>
  <!-- Knife handle -->
  <rect x="62" y="40" width="6" height="28" rx="3" fill="white"/>
</svg>
